name: Deploy Projeto Estatico Aluno

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      # --- NOVO PASSO: Configurar Python ---
      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Gerar Index no Servidor
        uses: appleboy/ssh-action@master
        with:
          host: ${{ vars.SSH_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            # Define a pasta do aluno
            TARGET_DIR="/var/inetpub/wwwroot/projetos/${{ vars.ALUNO_RA }}"
            
            # Comando Python para gerar o index direto na pasta do aluno
            python3 -c "
            import os
            path = '$TARGET_DIR'
            if os.path.exists(path):
                items = sorted([d for d in os.listdir(path) if os.path.isdir(os.path.join(path, d))])
                links = ''.join([f'<li><a href=\"{i}/\">{i}</a></li>' for i in items])
                html = f'<html><body style=\"font-family:sans-serif;padding:20px\"><h1>📂 Projetos de ${{ vars.ALUNO_RA }}</h1><ul>{{links}}</ul></body></html>'
                with open(os.path.join(path, 'index.html'), 'w') as f: f.write(html)
            "

      - name: Enviar HTML/CSS para o Servidor
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.SSH_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY}}
          # O source agora inclui o index.html gerado no passo anterior
          source: "./*" 
          target: "/var/inetpub/wwwroot/projetos/${{ vars.ALUNO_RA }}/${{ vars.ALUNO_PROJETO }}/"
          strip_components: 0

      - name: Ajustar Permissões (Opcional)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ vars.SSH_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            sudo chown -R ubuntu:www-data /var/inetpub/wwwroot/projetos/${{ vars.ALUNO_RA }}
            chmod -R 755 /var/inetpub/wwwroot/projetos/${{ vars.ALUNO_RA }}